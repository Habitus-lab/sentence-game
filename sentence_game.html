<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sentence Game</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 30px;
  background-color: #f5f7fb;
}

#logo {
  width: 200px;
  display: block;
  margin: 0 auto 20px auto;
}

#questionNumber {
  font-size: 24px;
}

#koreanBox {
  font-size: 22px;
  font-weight: bold;
  margin: 20px;
}

#wordBox button {
  font-size: 20px;
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background-color: #4a90e2;
  color: white;
  cursor: pointer;
}

#answerBox {
  font-size: 24px;
  margin-top: 20px;
  min-height: 40px;
}

button {
  font-size: 18px;
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background-color: #333;
  color: white;
  cursor: pointer;
}

#result {
  font-size: 22px;
  margin-top: 20px;
}
</style>
</head>

<body>

<img src="logo.png" id="logo">

<button onclick="startGame()">문제 시작</button>

<h3 id="questionNumber"></h3>

<h3>해석</h3>
<div id="koreanBox"></div>

<h3>섞인 단어</h3>
<div id="wordBox"></div>

<h3>내가 만든 문장</h3>
<div id="answerBox"></div>

<br>
<button onclick="checkAnswer()">정답 확인</button>
<button onclick="nextSentence()">다음 문제</button>

<p id="result"></p>

<script>

let sentences = [
"Our emotions are thought to exist because they have contributed to our survival as a species.",
"Fear has helped us avoid dangers, expressing anger helps us scare off threats, and expressing positive emotions helps us bond with others.",
"From an evolutionary perspective, an emotion is a kind of program that directs many of our activities including attention perception memory movement expressions etc.",
"For example, fear makes us very attentive narrows our perceptual focus to threatening stimuli will cause us either to face a situation fight or avoid it flight and may cause us to remember an experience more acutely so that we avoid the threat in the future.",
"Regardless of the specific ways in which they activate our systems the specific emotions we possess are thought to exist because they have helped us as a species survive challenges within our environment long ago.",
"If they had not helped us adapt and survive they would not have evolved with us."
];

let meanings = [
"우리의 감정은 생존에 기여해 왔기 때문에 존재한다고 여겨진다.",
"두려움은 위험을 피하게 하고, 분노는 위협을 몰아내며, 긍정적 감정은 유대감을 만든다.",
"감정은 주의, 지각, 기억, 움직임 등을 조절하는 하나의 프로그램이다.",
"두려움은 주의를 높이고 위협에 집중하게 하며 싸우거나 도망치게 하고 기억을 강화시킨다.",
"감정은 과거 환경에서 생존에 도움이 되었기 때문에 존재한다고 여겨진다.",
"만약 생존에 도움이 되지 않았다면 감정은 진화하지 않았을 것이다."
];

let currentIndex = 0;
let score = 0;
let originalWords = [];
let shuffledWords = [];

// ⭐ 2단어 묶기 유지 (원문 유지용)
function splitIntoPhrases(sentence) {
  let words = sentence.split(" ");
  let result = [];

  for (let i = 0; i < words.length; i += 2) {
    result.push(words.slice(i, i + 2).join(" "));
  }

  return result;
}

function startGame() {
  currentIndex = 0;
  score = 0;
  loadSentence();
}

function loadSentence() {

  document.getElementById("questionNumber").innerText =
    "문제 " + (currentIndex + 1) + " / " + sentences.length;

  document.getElementById("koreanBox").innerText =
    meanings[currentIndex];

  originalWords = splitIntoPhrases(sentences[currentIndex]);
  shuffledWords = [...originalWords];

  shuffledWords.sort(() => Math.random() - 0.5);

  document.getElementById("wordBox").innerHTML = "";
  document.getElementById("answerBox").innerHTML = "";
  document.getElementById("result").innerText = "";

  showWords();
}

function showWords() {

  let box = document.getElementById("wordBox");

  shuffledWords.forEach(word => {

    let btn = document.createElement("button");
    btn.innerText = word;

    btn.onclick = function() {
      document.getElementById("answerBox").innerText += word + " ";
      btn.remove();
    };

    box.appendChild(btn);
  });
}

function checkAnswer() {

  let answer = document.getElementById("answerBox").innerText.trim();
  let original = originalWords.join(" ");

  if (answer === original) {
    document.getElementById("result").innerText = "정답!";
  } else {
    document.getElementById("result").innerText = "틀림!";
  }
}

function nextSentence() {

  let answer = document.getElementById("answerBox").innerText.trim();
  let original = originalWords.join(" ");

  if (answer === original) score++;

  currentIndex++;

  if (currentIndex < sentences.length) {
    loadSentence();
  } else {
    document.getElementById("result").innerText =
      "끝! 점수: " + score + " / " + sentences.length;
  }
}

</script>

</body>
</html>
