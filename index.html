<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sentence Game</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 30px;
  background-color: #f5f7fb;
}

#logo {
  width: 200px;
  display: block;
  margin: 0 auto 20px auto;
}

#questionNumber {
  font-size: 24px;
}

#koreanBox {
  font-size: 22px;
  font-weight: bold;
  margin: 20px;
}

#wordBox button {
  font-size: 20px;
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background-color: #4a90e2;
  color: white;
  cursor: pointer;
}

#answerBox {
  font-size: 24px;
  margin-top: 20px;
  min-height: 40px;
}

.answer-word {
  margin-right: 8px;
  cursor: pointer;
  display: inline-block;
}

button {
  font-size: 18px;
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background-color: #333;
  color: white;
  cursor: pointer;
}

#result {
  font-size: 22px;
  margin-top: 20px;
}
</style>
</head>

<body>

<img src="logo.png" id="logo">

<button onclick="startGame()">문제 시작</button>

<h3 id="questionNumber"></h3>

<h3>해석</h3>
<div id="koreanBox"></div>

<h3>섞인 구</h3>
<div id="wordBox"></div>

<h3>내가 만든 문장</h3>
<div id="answerBox"></div>

<br>
<button onclick="checkAnswer()">정답 확인</button>
<button onclick="nextSentence()">다음 문제</button>

<p id="result"></p>

<script>

let sentences = [
"By improving accessibility of the workplace for workers that are typically at a disadvantage in the labour market, AI can improve inclusiveness in the workplace.",
"AIpowered assistive devices to aid workers with visual, speech or hearing difficulties are becoming more widespread, improving the access to, and the quality of work for people with disabilities.",
"For example, speech recognition solutions for people with dysarthric voices, or live captioning systems for deaf and hard of hearing people can facilitate communication with colleagues and access to jobs where interpersonal communication is necessary.",
"AI can also enhance the capabilities of lowskilled workers, with potentially positive effects on their wages and career prospects.",
"For example, AI’s capacity to translate written and spoken word in realtime can improve the performance of nonnative speakers in the workplace.",
"Moreover, recent developments in AIpowered text generators can instantly improve the performance of lowerskilled individuals in domains such as writing, coding or customer service."
];

let meanings = [
"노동 시장에서 일반적으로 불리한 위치에 있는 노동자를 위한 일터로의 접근성을 향상시킴으로써, AI는 일터에서 포괄성을 향상시킬 수 있다.",
"시각, 발화 또는 청각 장애가 있는 노동자들을 돕기 위한 AI 동력의 보조 장치들이 더 널리 보급되어, 장애를 지닌 사람들의 업무 접근성과 업무의 질을 향상시키고 있다.",
"예를 들어, 구음 장애가 있는 사람들을 위한 발화 인식 솔루션이나 청각 장애인과 난청인을 위한 실시간 자막 시스템은 동료와의 의사소통과 대인 의사소통이 필요한 일에 대한 접근을 용이하게 할 수 있다.",
"AI는 또한 그들의 임금과 경력 전망에 잠재적으로 긍정적인 영향과 함께 저숙련 노동자들의 능력을 향상시킬 수 있다.",
"예를 들어, 문자 언어와 음성 언어를 실시간으로 번역하는 AI의 능력은 일터에서 비원어민의 수행을 향상시킬 수 있다.",
"게다가, 최근의 AI 동력의 텍스트 생성기의 발전은 글쓰기, 코딩, 고객 서비스와 같은 영역에서 저숙련된 개인의 수행을 즉시 향상시킬 수 있다."
];

let currentIndex = 0;
let score = 0;
let originalWords = [];
let shuffledWords = [];

// ⭐ 2단어씩 끊는 핵심 함수
function splitIntoPhrases(sentence) {
  let words = sentence.split(" ");
  let result = [];

  for (let i = 0; i < words.length; i += 2) {
    result.push(words.slice(i, i + 2).join(" "));
  }

  return result;
}

function startGame() {
  currentIndex = 0;
  score = 0;
  loadSentence();
}

function loadSentence() {

  document.getElementById("questionNumber").innerText =
    "문제 " + (currentIndex + 1) + " / " + sentences.length;

  document.getElementById("koreanBox").innerText =
    meanings[currentIndex];

  originalWords = splitIntoPhrases(sentences[currentIndex]);
  shuffledWords = [...originalWords];

  shuffledWords.sort(() => Math.random() - 0.5);

  document.getElementById("wordBox").innerHTML = "";
  document.getElementById("answerBox").innerHTML = "";
  document.getElementById("result").innerText = "";

  showWords();
}

function showWords() {

  let box = document.getElementById("wordBox");

  shuffledWords.forEach(word => {

    let btn = document.createElement("button");
    btn.innerText = word;

    btn.onclick = function() {
      addWord(word, btn);
    };

    box.appendChild(btn);
  });
}

function addWord(word, btn) {

  let span = document.createElement("span");
  span.innerText = word;
  span.className = "answer-word";

  // 다시 클릭하면 되돌리기
  span.onclick = function() {
    btn.style.display = "inline-block";
    span.remove();
  };

  document.getElementById("answerBox").appendChild(span);

  btn.style.display = "none";
}

function checkAnswer() {

  let spans = document.querySelectorAll("#answerBox span");
  let answer = Array.from(spans).map(s => s.innerText).join(" ");
  let original = originalWords.join(" ");

  if (answer === original) {
    document.getElementById("result").innerText = "정답!";
  } else {
    document.getElementById("result").innerText = "틀림!";
  }
}

function nextSentence() {

  let spans = document.querySelectorAll("#answerBox span");
  let answer = Array.from(spans).map(s => s.innerText).join(" ");
  let original = originalWords.join(" ");

  if (answer === original) score++;

  currentIndex++;

  if (currentIndex < sentences.length) {
    loadSentence();
  } else {
    document.getElementById("result").innerText =
      "끝! 점수: " + score + " / " + sentences.length;
  }
}

</script>

</body>
</html>
