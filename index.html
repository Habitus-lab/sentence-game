<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habitus English Lab</title>

<!-- 세련된 폰트 불러오기 (Poppins & Noto Sans KR) -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary-color: #4f46e5;
  --secondary-color: #10b981;
  --accent-color: #f59e0b;
  --bg-gradient: linear-gradient(135deg, #f5f7ff 0%, #e4eaff 100%);
}

body {
  font-family: 'Poppins', 'Noto Sans KR', sans-serif;
  background: var(--bg-gradient);
  margin: 0;
  padding: 0;
  text-align: center;
  color: #1e293b;
  min-height: 100vh;
}

/* 헤더 디자인 */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  height: 90px;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(10px);
  box-shadow: 0 2px 15px rgba(0,0,0,0.05);
}

#logo {
  position: absolute;
  left: 30px;
  width: 120px;
  transition: transform 0.3s;
}

#logo:hover { transform: scale(1.05); }

.title {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(to right, #4f46e5, #9333ea);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 메인 컨테이너 */
.container {
  max-width: 850px;
  margin: 40px auto;
  background: white;
  padding: 40px;
  border-radius: 30px;
  box-shadow: 0 20px 40px rgba(79, 70, 229, 0.1);
}

/* 버튼 스타일 */
.main-btn {
  font-family: 'Poppins', 'Noto Sans KR', sans-serif;
  font-size: 16px;
  font-weight: 700;
  padding: 14px 28px;
  margin: 10px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  color: white;
  transition: all 0.2s ease;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.main-btn:active { transform: scale(0.96); }

.start { background: var(--secondary-color); display: block; margin: 0 auto 30px; padding: 18px 40px; font-size: 18px; }
.start:hover { background: #059669; box-shadow: 0 8px 15px rgba(16, 185, 129, 0.3); }

.check { background: var(--primary-color); }
.check:hover { background: #4338ca; box-shadow: 0 8px 15px rgba(79, 70, 229, 0.3); }

.next { background: var(--accent-color); }
.next:hover { background: #d97706; box-shadow: 0 8px 15px rgba(245, 158, 11, 0.3); }

#questionNumber { font-size: 18px; color: #94a3b8; margin-bottom: 5px; }

/* 문제 박스 */
#koreanBox {
  font-size: 21px;
  line-height: 1.6;
  font-weight: 600;
  margin: 25px 0;
  padding: 25px;
  background: #f8faff;
  border-left: 6px solid var(--primary-color);
  border-radius: 15px;
  word-break: keep-all;
}

h3 { font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

/* 단어 선택 박스 */
#wordBox { min-height: 80px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; }

#wordBox button {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px;
  padding: 12px 18px;
  border-radius: 12px;
  border: 2px solid #e2e8f0;
  background: white;
  color: #334155;
  cursor: pointer;
  transition: all 0.2s;
}

#wordBox button:hover {
  border-color: var(--primary-color);
  background: #f5f7ff;
  color: var(--primary-color);
}

/* 정답 영역 */
#answerBox {
  font-size: 22px;
  min-height: 70px;
  margin: 20px 0 30px;
  padding: 20px;
  background: #f1f5f9;
  border-radius: 18px;
  border: 2px dashed #cbd5e1;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.answer-word {
  background: var(--primary-color);
  color: white;
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

#result {
  font-size: 20px;
  margin-top: 25px;
  font-weight: 700;
  min-height: 30px;
}

/* 푸터 저작권 */
.footer {
  margin-top: 30px;
  padding-bottom: 40px;
  font-size: 13px;
  color: #94a3b8;
  font-weight: 500;
  letter-spacing: 0.5px;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" id="logo" alt="Logo">
  <!-- 첫 글자만 대문자로 수정 -->
  <div class="title">Habitus English Lab</div>
</div>

<div class="container">
  <button class="main-btn start" onclick="startGame()">학습 시작하기</button>

  <div id="questionNumber">시작 버튼을 눌러주세요</div>
  
  <h3>Translation</h3>
  <div id="koreanBox">단어 배열 퀴즈에 도전해보세요!</div>

  <h3>Scrambled Phrases</h3>
  <div id="wordBox"></div>

  <h3>Your Sentence</h3>
  <div id="answerBox"></div>

  <div style="margin-top: 20px;">
    <!-- 버튼 텍스트 한글로 변경 -->
    <button class="main-btn check" onclick="checkAnswer()">정답 확인</button>
    <button class="main-btn next" onclick="nextSentence()">다음 문제</button>
  </div>

  <p id="result"></p>
</div>

<div class="footer">
  ⓒViolet Youn Habitus. All Rights reserved.
</div>

<script>
const correctSound = new Audio("https://actions.google.com/sounds/v1/crowd/applause.ogg");
const wrongSound = new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");

let sentences = [
  "One valuable technique for getting out of helplessness, depression, and situations which are predominantly being run by the thought, “I can’t,” is to choose to be with other persons who have resolved the problem with which we struggle.",
  "This is one of the great powers of selfhelp groups.",
  "When we are in a negative state, we have given a lot of energy to negative thought forms, and the positive thought forms are weak.",
  "Those who are in a higher vibration are free of the energy from their negative thoughts and have energized positive thought forms.",
  "Merely to be in their presence is beneficial.",
  "In some selfhelp groups, this is called “hanging out with the winners.”",
  "The benefit here is on the psychic level of consciousness, and there is a transfer of positive energy and relighting of one’s own latent positive thought forms."
];

let meanings = [
  "무력함, 우울감, 그리고 ‘나는 할 수 없다’는 생각에 의해 지배되는 상황에서 벗어나기 위한 한 가지 유용한 기술은 우리가 분투하고 있는 문제를 해결해 본 사람들과 함께 있기로 선택하는 것이다.",
  "이것은 자조 집단의 큰 힘 중 하나이다.",
  "우리가 부정적인 상태에 있을 때, 우리는 부정적인 사고 형태에 많은 에너지를 쏟아 왔고 긍정적인 사고 형태는 약하다.",
  "더 높은 진동에 있는 사람들은 부정적인 사고에서 나오는 에너지로부터 자유롭고 긍정적인 사고 형태를 활성화시킨 상태이다.",
  "단지 그들과 함께 있는 것만으로도 유익하다.",
  "일부 자조 집단에서는 이것을 ‘승자들과 어울리기’라고 부른다.",
  "여기서의 이점은 의식의 정신적 수준에 있으며, 긍정적인 에너지의 전달과 자신의 잠재된 긍정적 사고 형태의 재점화가 일어난다."
];

let currentIndex = 0;
let score = 0;
let originalWords = [];
let shuffledWords = [];

function splitIntoPhrases(sentence) {
  let words = sentence.split(" ");
  let result = [];
  for (let i = 0; i < words.length; i += 2) {
    result.push(words.slice(i, i + 2).join(" "));
  }
  return result;
}

function startGame() {
  correctSound.play().then(()=>correctSound.pause()).catch(()=>{});
  wrongSound.play().then(()=>wrongSound.pause()).catch(()=>{});
  currentIndex = 0;
  score = 0;
  loadSentence();
}

function loadSentence() {
  document.getElementById("questionNumber").innerText = "Question " + (currentIndex + 1) + " / " + sentences.length;
  document.getElementById("koreanBox").innerText = meanings[currentIndex];
  
  originalWords = splitIntoPhrases(sentences[currentIndex]);
  shuffledWords = [...originalWords];
  shuffledWords.sort(() => Math.random() - 0.5);
  
  document.getElementById("wordBox").innerHTML = "";
  document.getElementById("answerBox").innerHTML = "";
  document.getElementById("result").innerText = "";
  
  showWords();
}

function showWords() {
  let box = document.getElementById("wordBox");
  shuffledWords.forEach(word => {
    let btn = document.createElement("button");
    btn.innerText = word;
    btn.onclick = function() { addWord(word, btn); };
    box.appendChild(btn);
  });
}

function addWord(word, btn) {
  let span = document.createElement("span");
  span.innerText = word;
  span.className = "answer-word";
  span.onclick = function() {
    btn.style.display = "inline-block";
    span.remove();
  };
  document.getElementById("answerBox").appendChild(span);
  btn.style.display = "none";
}

function checkAnswer() {
  let spans = document.querySelectorAll("#answerBox span");
  let answer = Array.from(spans).map(s => s.innerText).join(" ");
  let original = originalWords.join(" ");
  let resultEl = document.getElementById("result");

  if (answer === original) {
    resultEl.innerText = "정답! Corret answer!👏👏👏";
    resultEl.style.color = "#10b981";
    correctSound.currentTime = 0;
    correctSound.play().catch(()=>{});
  } else {
    resultEl.innerText = "땡! 틀렸습니다 Try again 💪";
    resultEl.style.color = "#ef4444";
    wrongSound.currentTime = 0;
    wrongSound.play().catch(()=>{});
  }
}

function nextSentence() {
  let spans = document.querySelectorAll("#answerBox span");
  let answer = Array.from(spans).map(s => s.innerText).join(" ");
  let original = originalWords.join(" ");
  
  if (answer === original) score++;
  currentIndex++;
  
  if (currentIndex < sentences.length) {
    loadSentence();
  } else {
    document.getElementById("koreanBox").innerText = "모든 문제를 풀었습니다!";
    document.getElementById("result").innerText = "최종 점수: " + score + " / " + sentences.length;
    document.getElementById("wordBox").innerHTML = "";
    document.getElementById("result").style.color = "#4f46e5";
  }
}
</script>

</body>
</html>
