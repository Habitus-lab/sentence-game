<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sentence Game</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 30px;
  background-color: #f5f7fb;
}

#logo {
  width: 200px;
  display: block;
  margin: 0 auto 20px auto;
}

#questionNumber {
  font-size: 24px;
}

#koreanBox {
  font-size: 22px;
  font-weight: bold;
  margin: 20px;
}

#wordBox button {
  font-size: 20px;
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background-color: #4a90e2;
  color: white;
  cursor: pointer;
}

#answerBox {
  font-size: 24px;
  margin-top: 20px;
  min-height: 40px;
}

.answer-word {
  margin-right: 8px;
  cursor: pointer;
  display: inline-block;
}

button {
  font-size: 18px;
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background-color: #333;
  color: white;
  cursor: pointer;
}

#result {
  font-size: 22px;
  margin-top: 20px;
}
</style>
</head>

<body>

<img src="logo.png" id="logo">

<button onclick="startGame()">문제 시작</button>

<h3 id="questionNumber"></h3>

<h3>해석</h3>
<div id="koreanBox"></div>

<h3>섞인 구</h3>
<div id="wordBox"></div>

<h3>내가 만든 문장</h3>
<div id="answerBox"></div>

<br>
<button onclick="checkAnswer()">정답 확인</button>
<button onclick="nextSentence()">다음 문제</button>

<p id="result"></p>

<script>

let sentences = [
"By improving accessibility of the workplace for workers that are typically at a disadvantage in the labour market, AI can improve inclusiveness in the workplace.",
"AIpowered assistive devices to aid workers with visual, speech or hearing difficulties are becoming more widespread, improving the access to, and the quality of work for people with disabilities.",
"For example, speech recognition solutions for people with dysarthric voices, or live captioning systems for deaf and hard of hearing people can facilitate communication with colleagues and access to jobs where interpersonal communication is necessary.",
"AI can also enhance the capabilities of lowskilled workers, with potentially positive effects on their wages and career prospects.",
"For example, AI’s capacity to translate written and spoken word in realtime can improve the performance of nonnative speakers in the workplace.",
"Moreover, recent developments in AIpowered text generators can instantly improve the performance of lowerskilled individuals in domains such as writing, coding or customer service."
];

let sentences = [
"One valuable technique for getting out of helplessness, depression, and situations which are predominantly being run by the thought, “I can’t,” is to choose to be with other persons who have resolved the problem with which we struggle.",
"This is one of the great powers of selfhelp groups.",
"When we are in a negative state, we have given a lot of energy to negative thought forms, and the positive thought forms are weak.",
"Those who are in a higher vibration are free of the energy from their negative thoughts and have energized positive thought forms.",
"Merely to be in their presence is beneficial.",
"In some selfhelp groups, this is called “hanging out with the winners.”",
"The benefit here is on the psychic level of consciousness, and there is a transfer of positive energy and relighting of one’s own latent positive thought forms."
];

let meanings = [
"무력함, 우울감, 그리고 ‘나는 할 수 없다’는 생각에 의해 지배되는 상황에서 벗어나기 위한 한 가지 유용한 기술은 우리가 분투하고 있는 문제를 해결해 본 사람들과 함께 있기로 선택하는 것이다.",
"이것은 자조 집단의 큰 힘 중 하나이다.",
"우리가 부정적인 상태에 있을 때, 우리는 부정적인 사고 형태에 많은 에너지를 쏟아 왔고 긍정적인 사고 형태는 약하다.",
"더 높은 진동에 있는 사람들은 부정적인 사고에서 나오는 에너지로부터 자유롭고 긍정적인 사고 형태를 활성화시킨 상태이다.",
"단지 그들과 함께 있는 것만으로도 유익하다.",
"일부 자조 집단에서는 이것을 ‘승자들과 어울리기’라고 부른다.",
"여기서의 이점은 의식의 정신적 수준에 있으며, 긍정적인 에너지의 전달과 자신의 잠재된 긍정적 사고 형태의 재점화가 일어난다."
];

let currentIndex = 0;
let score = 0;
let originalWords = [];
let shuffledWords = [];

// ⭐ 2단어씩 끊는 핵심 함수
function splitIntoPhrases(sentence) {
  let words = sentence.split(" ");
  let result = [];

  for (let i = 0; i < words.length; i += 2) {
    result.push(words.slice(i, i + 2).join(" "));
  }

  return result;
}

function startGame() {
  currentIndex = 0;
  score = 0;
  loadSentence();
}

function loadSentence() {

  document.getElementById("questionNumber").innerText =
    "문제 " + (currentIndex + 1) + " / " + sentences.length;

  document.getElementById("koreanBox").innerText =
    meanings[currentIndex];

  originalWords = splitIntoPhrases(sentences[currentIndex]);
  shuffledWords = [...originalWords];

  shuffledWords.sort(() => Math.random() - 0.5);

  document.getElementById("wordBox").innerHTML = "";
  document.getElementById("answerBox").innerHTML = "";
  document.getElementById("result").innerText = "";

  showWords();
}

function showWords() {

  let box = document.getElementById("wordBox");

  shuffledWords.forEach(word => {

    let btn = document.createElement("button");
    btn.innerText = word;

    btn.onclick = function() {
      addWord(word, btn);
    };

    box.appendChild(btn);
  });
}

function addWord(word, btn) {

  let span = document.createElement("span");
  span.innerText = word;
  span.className = "answer-word";

  // 다시 클릭하면 되돌리기
  span.onclick = function() {
    btn.style.display = "inline-block";
    span.remove();
  };

  document.getElementById("answerBox").appendChild(span);

  btn.style.display = "none";
}

function checkAnswer() {

  let spans = document.querySelectorAll("#answerBox span");
  let answer = Array.from(spans).map(s => s.innerText).join(" ");
  let original = originalWords.join(" ");

  if (answer === original) {
    document.getElementById("result").innerText = "정답!";
  } else {
    document.getElementById("result").innerText = "틀림!";
  }
}

function nextSentence() {

  let spans = document.querySelectorAll("#answerBox span");
  let answer = Array.from(spans).map(s => s.innerText).join(" ");
  let original = originalWords.join(" ");

  if (answer === original) score++;

  currentIndex++;

  if (currentIndex < sentences.length) {
    loadSentence();
  } else {
    document.getElementById("result").innerText =
      "끝! 점수: " + score + " / " + sentences.length;
  }
}

</script>

</body>
</html>
