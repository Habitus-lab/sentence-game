<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habitus English Lab</title>

<style>

body {
  font-family: 'Pretendard', sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fbff);
  margin: 0;
  padding: 0;
  text-align: center;
}

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  height: 80px;
  background: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

#logo {
  position: absolute;
  left: 20px;
  width: 110px;
}

.title {
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 900px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.main-btn {
  font-size: 16px;
  padding: 12px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  color: white;
}

.start {
  background: #10b981;
  display: block;
  margin: 20px auto;
}

.check { background: #6366f1; }
.next { background: #f59e0b; }

#questionNumber { font-size: 20px; color: #666; }

#koreanBox {
  font-size: 20px;
  font-weight: 600;
  margin: 20px;
  padding: 15px;
  background: #f1f5ff;
  border-radius: 12px;
}

#wordBox button {
  font-size: 17px;
  margin: 6px;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  background: #4a6cf7;
  color: white;
  cursor: pointer;
}

#answerBox {
  font-size: 22px;
  margin-top: 20px;
  min-height: 50px;
  padding: 10px;
  background: #fafafa;
  border-radius: 10px;
}

.answer-word {
  margin-right: 8px;
  background: #e8edff;
  padding: 5px 8px;
  border-radius: 6px;
  cursor: pointer;
}

#result {
  font-size: 20px;
  margin-top: 15px;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="header">
  <img src="logo.png" id="logo">
  <div class="title">Habitus English Lab</div>
</div>

<div class="container">

<button class="main-btn start" onclick="startGame()">Start</button>

<h3 id="questionNumber"></h3>

<h3>Translation</h3>
<div id="koreanBox"></div>

<h3>Scrambled Phrases</h3>
<div id="wordBox"></div>

<h3>Your Sentence</h3>
<div id="answerBox"></div>

<button class="main-btn check" onclick="checkAnswer()">정답 확인</button>
<button class="main-btn next" onclick="nextSentence()">다음 문제</button>

<p id="result"></p>

</div>

<!-- 🔊 효과음 -->
<audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="wrongSound" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script>

let sentences = [
"One valuable technique for getting out of helplessness, depression, and situations which are predominantly being run by the thought, “I can’t,” is to choose to be with other persons who have resolved the problem with which we struggle.",
"This is one of the great powers of selfhelp groups.",
"When we are in a negative state, we have given a lot of energy to negative thought forms, and the positive thought forms are weak.",
"Those who are in a higher vibration are free of the energy from their negative thoughts and have energized positive thought forms.",
"Merely to be in their presence is beneficial.",
"In some selfhelp groups, this is called “hanging out with the winners.”",
"The benefit here is on the psychic level of consciousness, and there is a transfer of positive energy and relighting of one’s own latent positive thought forms."
];

let meanings = [
"무력함, 우울감, 그리고 ‘나는 할 수 없다’는 생각에 의해 지배되는 상황에서 벗어나기 위한 한 가지 유용한 기술은 우리가 분투하고 있는 문제를 해결해 본 사람들과 함께 있기로 선택하는 것이다.",
"이것은 자조 집단의 큰 힘 중 하나이다.",
"우리가 부정적인 상태에 있을 때, 우리는 부정적인 사고 형태에 많은 에너지를 쏟아 왔고 긍정적인 사고 형태는 약하다.",
"더 높은 진동에 있는 사람들은 부정적인 사고에서 나오는 에너지로부터 자유롭고 긍정적인 사고 형태를 활성화시킨 상태이다.",
"단지 그들과 함께 있는 것만으로도 유익하다.",
"일부 자조 집단에서는 이것을 ‘승자들과 어울리기’라고 부른다.",
"여기서의 이점은 의식의 정신적 수준에 있으며, 긍정적인 에너지의 전달과 자신의 잠재된 긍정적 사고 형태의 재점화가 일어난다."
];

let currentIndex = 0;
let score = 0;
let originalWords = [];
let shuffledWords = [];

function splitIntoPhrases(sentence) {
  let words = sentence.split(" ");
  let result = [];
  for (let i = 0; i < words.length; i += 2) {
    result.push(words.slice(i, i + 2).join(" "));
  }
  return result;
}

function startGame() {
  currentIndex = 0;
  score = 0;
  loadSentence();
}

function loadSentence() {

  document.getElementById("questionNumber").innerText =
    "Question " + (currentIndex + 1) + " / " + sentences.length;

  document.getElementById("koreanBox").innerText =
    meanings[currentIndex];

  originalWords = splitIntoPhrases(sentences[currentIndex]);
  shuffledWords = [...originalWords];
  shuffledWords.sort(() => Math.random() - 0.5);

  document.getElementById("wordBox").innerHTML = "";
  document.getElementById("answerBox").innerHTML = "";
  document.getElementById("result").innerText = "";

  showWords();
}

function showWords() {
  let box = document.getElementById("wordBox");

  shuffledWords.forEach(word => {
    let btn = document.createElement("button");
    btn.innerText = word;

    btn.onclick = function() {
      addWord(word, btn);
    };

    box.appendChild(btn);
  });
}

function addWord(word, btn) {
  let span = document.createElement("span");
  span.innerText = word;
  span.className = "answer-word";

  span.onclick = function() {
    btn.style.display = "inline-block";
    span.remove();
  };

  document.getElementById("answerBox").appendChild(span);
  btn.style.display = "none";
}

function checkAnswer() {

  let spans = document.querySelectorAll("#answerBox span");
  let answer = Array.from(spans).map(s => s.innerText).join(" ");
  let original = originalWords.join(" ");

  if (answer === original) {
    document.getElementById("result").innerText = "정답!";
    document.getElementById("correctSound").play();
  } else {
    document.getElementById("result").innerText = "다시 시도!";
    document.getElementById("wrongSound").play();
  }
}

function nextSentence() {

  let spans = document.querySelectorAll("#answerBox span");
  let answer = Array.from(spans).map(s => s.innerText).join(" ");
  let original = originalWords.join(" ");

  if (answer === original) score++;

  currentIndex++;

  if (currentIndex < sentences.length) {
    loadSentence();
  } else {
    document.getElementById("result").innerText =
      "끝! 점수: " + score + " / " + sentences.length;
  }
}

</script>

</body>
</html>
